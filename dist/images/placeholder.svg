<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#grad)"/>
  
  <!-- Music note icon -->
  <g fill="#666666" opacity="0.6">
    <!-- First note -->
    <circle cx="160" cy="280" r="25"/>
    <rect x="180" y="100" width="8" height="180" rx="4"/>
    <!-- Second note -->
    <circle cx="240" cy="300" r="20"/>
    <rect x="258" y="140" width="8" height="160" rx="4"/>
    <!-- Connecting beam -->
    <path d="M 188 100 Q 258 110 266 140" stroke="#666666" stroke-width="8" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="20" fill="#666666" text-anchor="middle" opacity="0.8">Imagen no disponible</text>
</svg>
